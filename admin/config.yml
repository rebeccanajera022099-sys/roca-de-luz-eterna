collections:
  - name: "events"
    label: "Events"
    folder: "content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }

      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }

      - { label: "End Date/Time", name: "endDate", widget: "datetime", required: false, format: "YYYY-MM-DDTHH:mm:ssZ" }

      - { label: "Location", name: "location", widget: "string", required: false }

      - { label: "Featured Image", name: "image", widget: "image", required: false }

      - { label: "Description", name: "body", widget: "markdown", required: false }

      - { label: "Published", name: "published", widget: "boolean", default: true }
